<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Login | Painel Edilaine Santos</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
  /* ===================== VARIÁVEIS DO DESIGN SYSTEM ===================== */
  :root{
    --coral: #D4572A;
    --coral-escuro: #B8461F;
    --creme: #F5F3EF;
    --branco: #FFFFFF;
    --grafite: #1A1816;
    --texto-suave: #6B645C;
    --borda: #DDD8D0;
    --verde: #2D7A4F;
    --vermelho: #C4453C;
  }

  *{ box-sizing: border-box; margin: 0; padding: 0; }

  body{
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--creme);
    color: var(--grafite);
    font-family: 'Outfit', sans-serif;
    padding: 24px;
  }

  .cartao{
    width: 100%;
    max-width: 400px;
    background: var(--branco);
    border: 1px solid var(--borda);
    border-radius: 24px;
    padding: 40px 32px;
    box-shadow: 0 20px 50px rgba(26,24,22,.08);
  }

  .logo{
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 28px;
  }
  .logo .ponto{ color: var(--coral); }

  h1{
    font-family: 'Fraunces', serif;
    font-size: 1.6rem;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .subtitulo{
    color: var(--texto-suave);
    font-size: .95rem;
    margin-bottom: 28px;
    line-height: 1.5;
  }

  .campo{ margin-bottom: 18px; }
  .campo label{
    display: block;
    font-size: .85rem;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--grafite);
  }
  .campo input{
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid var(--borda);
    font-family: 'Outfit', sans-serif;
    font-size: .95rem;
    background: var(--creme);
    color: var(--grafite);
    transition: border-color .2s ease;
  }
  .campo input:focus{
    outline: none;
    border-color: var(--coral);
  }

  .link-acao{
    display: inline-block;
    font-size: .85rem;
    color: var(--coral);
    text-decoration: none;
    margin-bottom: 22px;
    cursor: pointer;
    background: none;
    border: none;
    font-family: 'Outfit', sans-serif;
    padding: 0;
  }
  .link-acao:hover{ text-decoration: underline; }

  .botao{
    width: 100%;
    padding: 13px;
    border-radius: 12px;
    border: none;
    background: var(--coral);
    color: var(--branco);
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    font-size: .95rem;
    cursor: pointer;
    transition: background .2s ease;
  }
  .botao:hover{ background: var(--coral-escuro); }
  .botao:disabled{ opacity: .7; cursor: not-allowed; }

  .link-voltar{
    display: block;
    text-align: center;
    margin-top: 16px;
    font-size: .85rem;
    color: var(--texto-suave);
    text-decoration: none;
    cursor: pointer;
    background: none;
    border: none;
    font-family: 'Outfit', sans-serif;
  }
  .link-voltar:hover{ color: var(--coral); }

  .faixa{
    padding: 12px 14px;
    border-radius: 12px;
    font-size: .85rem;
    margin-bottom: 20px;
    line-height: 1.4;
  }
  .faixa.erro{
    background: rgba(196,69,60,.1);
    color: var(--vermelho);
  }
  .faixa.sucesso{
    background: rgba(45,122,79,.1);
    color: var(--verde);
  }

  .oculto{ display: none !important; }
</style>
</head>
<body>

  <div class="cartao">
    <p class="logo">meu<span class="ponto">.</span>painel</p>
    <h1>Acesso restrito</h1>
    <p class="subtitulo">Faça login para ver os números do seu portfólio.</p>

    <div class="faixa oculto" id="faixaMensagem"></div>

    <!-- Formulário de login -->
    <form id="formLogin">
      <div class="campo">
        <label for="campoEmail">E-mail</label>
        <input type="email" id="campoEmail" required autocomplete="email">
      </div>
      <div class="campo">
        <label for="campoSenha">Senha</label>
        <input type="password" id="campoSenha" required autocomplete="current-password">
      </div>
      <button type="button" class="link-acao" id="linkEsqueci">Esqueci minha senha</button>
      <button type="submit" class="botao" id="botaoEntrar">Entrar</button>
    </form>

    <!-- Formulário de recuperação de senha (escondido por padrão) -->
    <form id="formRecuperar" class="oculto">
      <div class="campo">
        <label for="campoEmailRecuperar">E-mail</label>
        <input type="email" id="campoEmailRecuperar" required autocomplete="email">
      </div>
      <button type="submit" class="botao" id="botaoRecuperar">Enviar link de recuperação</button>
      <button type="button" class="link-voltar" id="linkVoltar">Voltar para o login</button>
    </form>
  </div>

<script src="js/auth.js"></script>
<script>
  // Se já existir uma sessão ativa, pula direto para o painel
  (async () => {
    const { data } = await Auth.client.auth.getSession();
    if (data.session) {
      window.location.href = "painel.html";
    }
  })();

  const formLogin = document.getElementById("formLogin");
  const formRecuperar = document.getElementById("formRecuperar");
  const faixaMensagem = document.getElementById("faixaMensagem");
  const botaoEntrar = document.getElementById("botaoEntrar");
  const botaoRecuperar = document.getElementById("botaoRecuperar");

  function mostrarMensagem(texto, tipo){
    faixaMensagem.textContent = texto;
    faixaMensagem.className = "faixa " + tipo;
  }

  function esconderMensagem(){
    faixaMensagem.className = "faixa oculto";
    faixaMensagem.textContent = "";
  }

  // Envio do login
  formLogin.addEventListener("submit", async (e) => {
    e.preventDefault();
    esconderMensagem();

    const email = document.getElementById("campoEmail").value.trim();
    const senha = document.getElementById("campoSenha").value;

    botaoEntrar.disabled = true;
    botaoEntrar.textContent = "Entrando...";

    try {
      await Auth.login(email, senha);
      window.location.href = "painel.html";
    } catch (erro) {
      mostrarMensagem(erro.message, "erro");
      botaoEntrar.disabled = false;
      botaoEntrar.textContent = "Entrar";
    }
  });

  // Troca para o formulário de recuperação de senha
  document.getElementById("linkEsqueci").addEventListener("click", () => {
    esconderMensagem();
    formLogin.classList.add("oculto");
    formRecuperar.classList.remove("oculto");
  });

  // Volta para o formulário de login
  document.getElementById("linkVoltar").addEventListener("click", () => {
    esconderMensagem();
    formRecuperar.classList.add("oculto");
    formLogin.classList.remove("oculto");
  });

  // Envio da recuperação de senha
  formRecuperar.addEventListener("submit", async (e) => {
    e.preventDefault();
    esconderMensagem();

    const email = document.getElementById("campoEmailRecuperar").value.trim();

    botaoRecuperar.disabled = true;
    botaoRecuperar.textContent = "Enviando...";

    try {
      await Auth.recuperarSenha(email);
      mostrarMensagem("Enviamos um link de recuperação para o seu e-mail.", "sucesso");
    } catch (erro) {
      mostrarMensagem("Não foi possível enviar o link agora. Tente novamente.", "erro");
    }

    botaoRecuperar.disabled = false;
    botaoRecuperar.textContent = "Enviar link de recuperação";
  });
</script>
</body>
</html>
